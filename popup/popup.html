<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 260px; margin: 0; font: 13px -apple-system, "Segoe UI", sans-serif; color: #1f2328; background: #fff; }
    @media (prefers-color-scheme: dark) { body { color: #e6edf3; background: #0d1117; } }
    .head { padding: 12px 14px; font-weight: 600; border-bottom: 1px solid #d0d7de33; display: flex; align-items: center; gap: 8px; }
    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .row label { flex: 1; }
    select { padding: 4px 6px; border-radius: 6px; border: 1px solid #d0d7de; background: inherit; color: inherit; }
    .hint { font-size: 11px; opacity: 0.7; line-height: 1.4; }
    .swatch { width: 18px; height: 18px; border-radius: 4px; background: #d29922; }
    input[type=checkbox] { width: 16px; height: 16px; accent-color: #d29922; }
  </style>
</head>
<body>
  <div class="head"><span class="swatch"></span> GitHub Comment Hider</div>
  <div class="body">
    <div class="row">
      <label for="enabled">Enabled</label>
      <input type="checkbox" id="enabled" />
    </div>
    <div class="row">
      <label for="selectionMode">Show selection checkboxes</label>
      <input type="checkbox" id="selectionMode" />
    </div>
    <div class="row">
      <label for="floatingNav">Show navigation buttons</label>
      <input type="checkbox" id="floatingNav" />
    </div>
    <div class="row">
      <label for="defaultTheme">Default hide theme</label>
      <select id="defaultTheme">
        <option value="OUTDATED">Outdated</option>
        <option value="OFF_TOPIC">Off-topic</option>
        <option value="DUPLICATE">Duplicate</option>
        <option value="RESOLVED">Resolved</option>
        <option value="SPAM">Spam</option>
        <option value="ABUSE">Abuse</option>
      </select>
    </div>
    <div class="row">
      <label for="diagnostics">Diagnostics logging</label>
      <input type="checkbox" id="diagnostics" />
    </div>
    <div class="hint">Open a GitHub issue, tick the comments you want, pick a theme, then click <b>Hide selected</b> in the on-page panel. Changes apply on the next page or after reload.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
